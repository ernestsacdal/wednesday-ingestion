name: weekly-catalogue

# Loads the FULL supermarket catalogue (both retailers, ~41k products after
# marketplace exclusion) from the hotprices dumps into `products`, so every
# product is searchable + watchable — even ones that never go half-price. The
# catalogue step is SEARCH-ONLY (writes only `products`); the follow-up steps
# refresh the weekly derived data: predictions, the prediction track record
# (backtest), and cross-store counterpart links — then verify invariants.
#
# Weekly (the catalogue changes slowly); the daily-ingestion workflow handles
# the time-sensitive half-price refresh and stays light. Cron is UTC.
# 03:00 UTC Sunday = ~2pm AEST Sun. Manual trigger also exposed.
on:
  schedule:
    - cron: "0 3 * * 0"  # 03:00 UTC Sunday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  catalogue:
    name: Ingest full catalogue -> Supabase (search-only)
    runs-on: ubuntu-latest
    # Catalogue load + predictor + backtest + matcher + verify; each is a few
    # minutes, the buffer covers pooler latency variance.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest full catalogue (both retailers)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.ingest_catalogue --retailer all --verbose

      # Weekly derived-data refresh. Without these, predictions drift into the
      # past, the track record goes stale, and new products never gain
      # cross-store links — all silently. Each step fails the run on error.
      - name: Recompute predictions
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.prediction.statistical --from-db --write-db --min-cycles 1

      - name: Recompute prediction track record (backtest)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.backtest --write-db

      - name: Refresh cross-store counterpart links
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.match_counterparts --write-db

      # Same loud safety net as the daily workflow: bad data goes red + emails.
      - name: Verify data invariants
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.verify_data --verbose
