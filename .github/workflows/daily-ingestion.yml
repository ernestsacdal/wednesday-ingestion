name: daily-ingestion

# Refreshes both retailers' half-price specials in Supabase once a day:
#   - Coles:       the public hotprices.org daily dump (a CDN file; refreshes
#                  ~01:00 UTC / ~11am AEST). We derive half-price from the price
#                  series and cache it (source='hotprices').
#   - Woolworths:  the retailer's own authoritative browse API
#                  (source='woolies_catalogue').
#
# Cron is UTC. ~02:17 UTC daily = ~12:17pm AEST / ~1:17pm AEDT — ~1h after the
# dump refresh, so Coles is always same-day fresh and mid-week additions are
# caught. Off-the-hour minute: GitHub's scheduler is most congested on :00
# slots and has been dispatching 2.5-4h late; an odd minute dispatches closer
# to time. The midday residential task (scripts/refresh-midday.ps1) is the
# primary week-roller; this run is the backstop (ADR-0001, wednesday repo).
# Manual trigger also exposed.
on:
  schedule:
    - cron: "17 2 * * *"  # ~02:17 UTC daily, just after the hotprices dump refresh
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    name: Refresh Coles + Woolies half-price -> Supabase
    runs-on: ubuntu-latest
    # Both writes go through the set-based bulk writer (~8s Coles, ~75s Woolies
    # incl. the API paginate), plus a bounded image mop-up — a couple of minutes
    # total. Generous buffer for network flakes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline (Coles hotprices + Woolies API -> Supabase + alerts)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        # --send-alerts: weekly watchlist digest right after the data lands
        # (~12:15pm AEST). Once-per-week per device via the DB dedup; the
        # sender's week gate keeps stale-week days as no-ops.
        run: python -m src.pipeline --write-db --send-alerts --verbose

      # Continuous Coles accuracy probe: measure our half-price set against
      # Coles' own weekly catalogue (SaleFinder, cloud-reachable, explicit
      # "1/2 PRICE" flag) into accuracy_audit, and correct the few
      # catalogue-confirmed items the dump derivation missed. Soft-fails (exit 0)
      # if SaleFinder is unreachable; the verify_data freshness invariant catches
      # persistent failure.
      - name: Probe + correct Coles accuracy (SaleFinder)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.audit_accuracy --write-db --correct --verbose

      # Keep Half-Price Dinners current AND honest. --revalidate: seeds the new
      # week when it's empty (week rolls daily-cron-time, the LLM batch only runs
      # Sundays), and regenerates the week when any dinner hero is no longer
      # half-price (the residential Woolies live pull + SaleFinder corrections
      # prune dump false-positives after dinners were composed). Untouched when
      # every hero holds. A repair deliberately replaces a Sunday LLM batch with
      # seed dinners — honesty over richness.
      - name: Seed or repair this week's dinners
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.generate_recipes --seed --write-db --revalidate --verbose

      # The loud safety net: asserts data invariants (per-retailer current-week
      # floors, week freshness, no junk rows, derived-data freshness...) and
      # FAILS the run when any are violated — which triggers GitHub's failure
      # email. A pipeline that "succeeded" but produced bad data goes red here.
      - name: Verify data invariants
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m src.verify_data --verbose
