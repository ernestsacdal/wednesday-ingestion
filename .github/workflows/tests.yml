name: tests

# Pure-logic unit tests (derivation, week math, predictor, recipe slotting).
# No DB, no network, no secrets — so this runs on every push/PR as a fast gate
# distinct from the data-pipeline workflows.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest
